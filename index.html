<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather City</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    
    <div id="app">
        <!--Search Bar-->
        <div id="searchBar">
            <input type="text" id="searchBarInput" placeholder="Search By City">
            <button id="searchIcon" onclick="getWeather()"><i class="fa fa-search" aria-hidden="true"></i></button>
        </div>

        <!--Date and City-->
        <div id="info">
            <p id="date" style="margin-bottom: 20px;"></p>
            <p id="city"></p>
        </div>       

        <!--temImg-->
        <div id="tempImg"></div>

        <!--Description-->
        <div id="description"></div>

        <!--Temp-->
        <div id="temp"></div>

        <!--Extra Info-->
        <div id="extraInfo">
            <div class="col">
                <h5>Highs</h5>
                <p id="tempMax"></p>
            </div>

            <div class="col">
                <h5>Lows</h5>
                <p id="tempMin"></p>
            </div>
        </div>
    </div>


    <script src="app.js"></script>
</body>
</html>
